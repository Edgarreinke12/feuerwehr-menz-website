id="email"
type="text"
placeholder="Benutzername"
style="width:100%;padding:10px;margin-bottom:15px;"
>

id="password"
type="password"

style="width:100%;padding:10px;margin-bottom:15px;"
>

padding:12px;
background:#c40000;
border:none;
color:white;
font-size:16px;
border-radius:6px;
cursor:pointer;
